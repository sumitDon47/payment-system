apiVersion: v1
kind: ConfigMap
metadata:
  name: payment-config
data:
  DB_HOST: "postgres-svc"
  DB_PORT: "5432"
  DB_USER: "postgres"
  DB_NAME: "payment_db"
  KAFKA_BROKER: "kafka-svc:9092"
  KAFKA_TOPIC: "payment.completed"
  KAFKA_GROUP_ID: "notification-service"
  REDIS_URL: "redis-svc:6379"
  PORT: "8080"
  GRPC_PORT: "9090"
  CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:5173"
---
apiVersion: v1
kind: Secret
metadata:
  name: payment-secrets
type: Opaque
stringData:
  DB_PASSWORD: "yourpassword"
  POSTGRES_PASSWORD: "yourpassword"
  REDIS_PASSWORD: ""
  JWT_SECRET: "change-this-to-a-long-random-string-at-least-32chars"
  INTERNAL_API_KEY: "change-this-internal-api-key-at-least-32chars"
  SENDGRID_API_KEY: "replace-with-your-sendgrid-api-key"