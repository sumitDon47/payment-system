apiVersion: v1
kind: Service
metadata:
  name: user-service-svc
spec:
  type: LoadBalancer # Externally accessible
  selector:
    app: user-service
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: payment-system-user-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: payment-config
            - secretRef:
                name: payment-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service-svc
spec:
  type: ClusterIP # Internal only
  selector:
    app: payment-service
  ports:
    - port: 9090
      targetPort: 9090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: payment-system-payment-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9090
          envFrom:
            - configMapRef:
                name: payment-config
            - secretRef:
                name: payment-secrets
          env:
            - name: ENABLE_GRPC_REFLECTION
              value: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: payment-system-notification-service:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: payment-config
            - secretRef:
                name: payment-secrets