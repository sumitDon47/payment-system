name: Health Check

on:
  schedule:
    # Run health check every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  health-check:
    name: Monitor Service Health
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Run dependency checks
        run: |
          echo "🔍 Checking dependencies..."
          cd user-service && go mod verify && cd ..
          cd payment-service && go mod verify && cd ..
          cd notification-service && go mod verify && cd ..
          echo "✅ All dependencies verified"

      - name: Check for security vulnerabilities
        run: |
          echo "🔒 Checking for security vulnerabilities..."
          go install github.com/golang/vuln/cmd/govulncheck@latest
          
          cd user-service && govulncheck ./... && cd ..
          cd payment-service && govulncheck ./... && cd ..
          cd notification-service && govulncheck ./... && cd ..
          
          echo "✅ No known vulnerabilities found"

      - name: Create health status artifact
        run: |
          cat > health-status.txt << EOF
          Payment System Health Check
          ==========================
          
          Date: $(date)
          
          Services:
          - User Service: ✅
          - Payment Service: ✅
          - Notification Service: ✅
          
          Dependencies: ✅ All verified
          Vulnerabilities: ✅ None found
          
          Status: HEALTHY
          EOF
          
          cat health-status.txt

      - name: Upload health report
        uses: actions/upload-artifact@v3
        with:
          name: health-check-report
          path: health-status.txt
          retention-days: 30

      - name: Notify if unhealthy
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ Health check failed! Please investigate.'
            })
