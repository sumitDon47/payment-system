name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  # ─────────────────────────────────────────────────────────────────────────
  #  Job 1 — Test user-service
  # ─────────────────────────────────────────────────────────────────────────
  test-user-service:
    name: Run Unit Tests (user-service)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: yourpassword
          POSTGRES_DB: payment_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: user-service/go.sum

      - name: Run tests
        working-directory: user-service
        env:
          TEST_DATABASE_URL: postgres://postgres:yourpassword@localhost:5432/payment_db?sslmode=disable
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: yourpassword
          DB_NAME: payment_db
        run: |
          go mod tidy
          go test ./... -v -coverprofile=coverage.out -covermode=atomic
          go tool cover -func=coverage.out

  # ─────────────────────────────────────────────────────────────────────────
  #  Job 2 — Test payment-service
  # ─────────────────────────────────────────────────────────────────────────
  test-payment-service:
    name: Run Unit Tests (payment-service)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: yourpassword
          POSTGRES_DB: payment_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: payment-service/go.sum

      - name: Run tests
        working-directory: payment-service
        env:
          TEST_DATABASE_URL: postgres://postgres:yourpassword@localhost:5432/payment_db?sslmode=disable
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: yourpassword
          DB_NAME: payment_db
        run: |
          go mod tidy
          go test ./... -v -coverprofile=coverage.out -covermode=atomic
          go tool cover -func=coverage.out

  # ─────────────────────────────────────────────────────────────────────────
  #  Job 3 — Test notification-service
  # ─────────────────────────────────────────────────────────────────────────
  test-notification-service:
    name: Run Unit Tests (notification-service)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: notification-service/go.sum

      - name: Run tests
        working-directory: notification-service
        run: |
          go mod tidy
          go test ./... -v

  # ─────────────────────────────────────────────────────────────────────────
  #  Job 4 — Build Docker images (only after tests pass)
  # ─────────────────────────────────────────────────────────────────────────
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [ test-user-service, test-payment-service, test-notification-service ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build user-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: user-service/Dockerfile
          push: false
          tags: payment-system/user-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build payment-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: payment-service/Dockerfile
          push: false
          tags: payment-system/payment-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build notification-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: notification-service/Dockerfile
          push: false
          tags: payment-system/notification-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────
  #  Job 6 — Deploy (only on push to main)
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [ build-docker ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        run: |
          echo "✅ All tests passed on commit ${{ github.sha }}"
          echo "🚀 Ready for production deployment"
          echo "Add your deploy command here when you have a server"