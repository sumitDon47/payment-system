name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'user-service/**'
      - 'payment-service/**'
      - 'notification-service/**'
      - '.github/workflows/**'
      - 'docker-compose.yml'
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # TEST JOB - Run unit tests for all services
  # ════════════════════════════════════════════════════════════════════════════
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: payment_system
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    strategy:
      matrix:
        service:
          - user-service
          - payment-service
          - notification-service
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: payment_system
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          cache: true
          cache-dependency-path: '${{ matrix.service }}/go.sum'

      - name: Download dependencies
        working-directory: ./${{ matrix.service }}
        run: go mod download

      - name: Run tests
        working-directory: ./${{ matrix.service }}
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./${{ matrix.service }}/coverage.out
          flags: ${{ matrix.service }}
          fail_ci_if_error: false

  # ════════════════════════════════════════════════════════════════════════════
  # BUILD JOB - Build Docker images
  # ════════════════════════════════════════════════════════════════════════════
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - user-service
          - payment-service
          - notification-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/payment-system-${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/payment-system-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ════════════════════════════════════════════════════════════════════════════
  # LINT JOB - Check code quality
  # ════════════════════════════════════════════════════════════════════════════
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - user-service
          - payment-service
          - notification-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          working-directory: ./${{ matrix.service }}
          args: --timeout=5m

  # ════════════════════════════════════════════════════════════════════════════
  # INTEGRATION TEST JOB - Docker Compose based integration tests
  # ════════════════════════════════════════════════════════════════════════════
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: payment_user
          POSTGRES_PASSWORD: password123
          POSTGRES_DB: payment_system
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      kafka:
        image: confluentinc/cp-kafka:7.4.0
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: localhost:2181
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:29092
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        options: >-
          --health-cmd "kafka-broker-api-versions --bootstrap-server localhost:29092"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Run integration tests
        run: |
          export DATABASE_URL="postgresql://payment_user:password123@localhost:5432/payment_system"
          export KAFKA_BROKER="localhost:29092"
          
          # Test each service
          cd payment-service && go test -v -run Integration ./... && cd ..
          cd user-service && go test -v -run Integration ./... && cd ..
          cd notification-service && go test -v -run Integration ./... && cd ..

  # ════════════════════════════════════════════════════════════════════════════
  # SECURITY SCAN JOB - Security vulnerability scanning
  # ════════════════════════════════════════════════════════════════════════════
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ════════════════════════════════════════════════════════════════════════════
  # DEPLOY JOB - Deploy to production
  # ════════════════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [ test, build, lint, security ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy notification
        run: |
          echo "✅ All checks passed!"
          echo "📦 Building and pushing Docker images..."
          echo "🚀 Ready to deploy to production"
          echo ""
          echo "Next steps:"
          echo "1. Pull latest images: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/payment-system-*"
          echo "2. Update docker-compose.yml with new image tags"
          echo "3. Run: docker-compose up -d"

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: release-${{ github.sha }}
          release_name: Release ${{ github.sha }}
          body: |
            ## Deployment Information
            - Commit: ${{ github.sha }}
            - Branch: ${{ github.ref }}
            - Actor: ${{ github.actor }}
            
            ### Docker Images
            - User Service: `${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/payment-system-user-service:${{ github.sha }}`
            - Payment Service: `${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/payment-system-payment-service:${{ github.sha }}`
            - Notification Service: `${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/payment-system-notification-service:${{ github.sha }}`
            
            All tests passed ✅
            Code quality checks passed ✅
            Security scan completed ✅
          draft: false
          prerelease: false
