name: Deploy to Docker Hub

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Manual Deployment
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push all services
        run: |
          REGISTRY="ghcr.io/${{ github.repository_owner }}"
          TAG="${{ github.sha }}-${{ inputs.environment }}"
          
          echo "📦 Building and pushing Docker images for ${{ inputs.environment }}..."
          
          for service in user-service payment-service notification-service; do
            echo "Building $service..."
            docker build -t "$REGISTRY/payment-system-$service:$TAG" ./$service
            docker push "$REGISTRY/payment-system-$service:$TAG"
            echo "✅ Pushed $service:$TAG"
          done

      - name: Notify deployment
        run: |
          echo "🚀 Deployment to ${{ inputs.environment }} prepared!"
          echo ""
          echo "Docker images built and pushed:"
          echo "- ghcr.io/${{ github.repository_owner }}/payment-system-user-service:${{ github.sha }}-${{ inputs.environment }}"
          echo "- ghcr.io/${{ github.repository_owner }}/payment-system-payment-service:${{ github.sha }}-${{ inputs.environment }}"
          echo "- ghcr.io/${{ github.repository_owner }}/payment-system-notification-service:${{ github.sha }}-${{ inputs.environment }}"
          echo ""
          echo "Next: Pull these images and deploy with docker-compose"
