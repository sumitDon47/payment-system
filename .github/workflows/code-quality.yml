name: Code Quality

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

jobs:
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - user-service
          - payment-service
          - notification-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Check code formatting
        working-directory: ./${{ matrix.service }}
        run: |
          if [ -n "$(gofmt -s -l .)" ]; then
            echo "❌ Code formatting issues found!"
            gofmt -s -d .
            exit 1
          fi
          echo "✅ Code formatting OK"

      - name: Check for imports
        working-directory: ./${{ matrix.service }}
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          golangci-lint run --timeout=5m
          echo "✅ Import checks passed"

      - name: Vet code
        working-directory: ./${{ matrix.service }}
        run: |
          go vet ./...
          echo "✅ Go vet checks passed"

      - name: Check for race conditions
        working-directory: ./${{ matrix.service }}
        run: |
          go test -race -short ./... > /dev/null
          echo "✅ Race condition checks passed"

      - name: Generate coverage report
        working-directory: ./${{ matrix.service }}
        run: |
          go test -coverprofile=coverage.out ./...
          coverage=$(go tool cover -func=coverage.out | grep total | awk '{print $3}')
          echo "📊 Code coverage: $coverage"
          
          # Fail if coverage below 60%
          MIN_COVERAGE=60
          COVERAGE_INT=$(echo $coverage | sed 's/%//' | cut -d'.' -f1)
          if [ "$COVERAGE_INT" -lt "$MIN_COVERAGE" ]; then
            echo "❌ Coverage $coverage is below $MIN_COVERAGE%"
            exit 1
          fi
          echo "✅ Coverage meets minimum threshold"

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./${{ matrix.service }}/coverage.out
          flags: ${{ matrix.service }}

  security-check:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug

      - name: Run SAST analysis
        uses: securego/gosec@master
        with:
          args: '-no-fail -fmt sarif -out gosec-report.sarif ./...'

      - name: Upload SAST results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: gosec-report.sarif
